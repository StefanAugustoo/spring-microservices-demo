server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: '*'
            allowedMethods: '*'
            allowedHeaders: '*'
      routes:
        - id: pecas-service
          uri: lb://pecas-service
          predicates:
            - Path=/api/pecas/**
        - id: clientes-service
          uri: lb://clientes-service
          predicates:
            - Path=/api/clientes/**
        - id: representantes-service
          uri: lb://representantes-service
          predicates:
            - Path=/api/representantes/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
