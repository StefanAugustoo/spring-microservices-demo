spring:
  application:
    name: api-gateway
  cloud:
    config:
      import-check:
        enabled: false
    gateway:
      routes:
        - id: pecas-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/pecas/**
        - id: clientes-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/clientes/**
        - id: representantes-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/representantes/**

eureka:
  client:
    enabled: false

server:
  port: 0
