spring:
  application:
    name: pecas-service
  cloud:
    config:
      import-check:
        enabled: false
  datasource:
    url: jdbc:h2:mem:pecastest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    enabled: false

server:
  port: 0
