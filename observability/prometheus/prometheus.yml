# Coleta métricas dos serviços Spring em execução no host (portas do Config Server).
# Requer Docker Desktop / Engine com host.docker.internal (ver docker-compose.observability.yml).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8888"]

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8761"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: pecas-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: clientes-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: representantes-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
